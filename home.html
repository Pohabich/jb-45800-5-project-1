<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="styles/styles.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <script defer src="sources/appData.js"></script>
    <script defer src="scripts/general.js"></script>
    <script defer src="scripts/index.js"></script>
    <title></title>
</head>
<body>
    <div id="container">
        <header></header>

        <nav></nav>

        <main>
            <form id="itemForm" onsubmit="submitExpense(event)" class="row row-cols-lg-auto gy-3 gx-3">
                <!--Used for update. DON'T TOUCH!!!'-->
                <input id="expenseId" hidden/>
                <div>
                    <label for="expenseType" class="form-label">Category: </label>
                    <select id="expenseType" class="form-select" onchange="setDescriptionRequired(event)" required></select>
                </div>
                <div>
                    <label for="about" class="form-label">Description: </label>
                    <textarea id="about" class="form-control"></textarea>
                </div>
                <div>
                    <label for="amount" class="form-label">Amount: </label>
                    <input id="amount" type="number" min="1" max="100000" class="form-control" required />
                </div>
                <div>
                    <label for="date" class="form-label">Date: </label><br />
                    <input id="date" type="date" required />
                </div>
                <!--buttons-->
                <div class="col">
                    <br />
                    <input id="submit" type="submit" class="btn btn-primary" />
                    <input id="reset" type="reset" class="btn btn-danger" />
                </div>
            </form>
            <br />
            <br />
            <div id="tableContainer"></div>
        </main>

        <footer></footer>
    </div>
</body>
</html>
