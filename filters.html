<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="styles/styles.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <script defer src="sources/appData.js"></script>
    <script defer src="scripts/general.js"></script>
    <script defer src="scripts/fiters.js"></script>
    <title></title>
</head>
<body>
    <div id="container">
        <header></header>

        <nav></nav>

        <main>
            <label class="title">Date filter</label>
            <form id="dateFilterForm" onsubmit="applyDate(event)" onreset="clearDateForm(event)" class="row row-cols-lg">
                <div class="col">
                    <label for="years" class="form-label">Year: </label>
                    <select id="years" class="form-select" onchange="enableMonths(event)" required></select>
                </div>
                <div class="col">
                    <label for="months" class="form-label">Month: </label>
                    <select id="months" class="form-select" disabled onchange="enableDays(event)"></select>
                </div>
                <div class="col">
                    <label for="days" class="form-label">Day: </label>
                    <select id="days" class="form-select" disabled></select>
                </div>
                <!--buttons-->
                <div class="col">
                    <br />
                    <input id="submitDate" type="submit" value="Apply" class="btn btn-primary" />
                    <input id="resetDate" type="reset" value="Clear" class="btn btn-danger" />
                </div>
            </form>

            <br />
            <label class="title">Amount filter</label>
            <form id="amountFilterForm" onsubmit="applyAmount(event)" class="row row-cols-lg-auto gy-3 gx-3">
                <div class="col">
                    <label for="amount" class="form-label">Amount: </label>
                    <input id="amount" type="number" min="1" max="100000" class="form-control" required />
                </div>
                <!--buttons-->
                <div class="col">
                    <br />
                    <input id="submitAmount" type="submit" value="Apply" class="btn btn-primary" />
                    <input id="resetAmount" type="reset" value="Clear" class="btn btn-danger" />
                </div>
            </form>
            <br />
            <br />
            <div id="tableContainer"></div>
        </main>

        <footer></footer>
    </div>
</body>
</html>
